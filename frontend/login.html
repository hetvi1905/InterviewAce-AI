<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InterviewAce AI</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header Navigation -->
    <nav class="glass-nav">
        <div class="navbar-container">
            <a href="/" class="logo">
                <i class="fas fa-graduation-cap"></i>
                InterviewAce <span>AI</span>
            </a>
            <div class="nav-links">
                <a href="/signup" class="nav-link">Sign Up</a>
                <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="main-layout auth-wrapper">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Log in to continue your mock interview practice</p>
            </div>
            
            <div id="errorAlert" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.85rem;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/signup">Sign Up</a>
            </div>
        </div>
    </main>

    <!-- Loading Animation Modal -->
    <div id="loader" class="loader-wrapper">
        <div class="spinner"></div>
        <div class="loader-text">Logging in...</div>
    </div>

    <!-- Theme and Form Logic script link -->
    <script src="js/login.js"></script>
    <script>
        // Load saved theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('#themeToggle i').classList.replace('fa-moon', 'fa-sun');
        }
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const icon = document.querySelector('#themeToggle i');
            if (isDark) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });
    </script>
</body>
</html>
